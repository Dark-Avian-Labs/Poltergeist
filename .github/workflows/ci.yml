name: Poltergeist CI/CD

permissions:
  contents: read
  pull-requests: read

on:
  push:
    branches: [main]
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/**'
      - 'assets/**'
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-checks:
    runs-on: blacksmith-8vcpu-windows-2025
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: useblacksmith/checkout@v1

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies and build outputs
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-stable-workspace

      - name: Run quality checks
        shell: pwsh
        run: ./scripts/validate.ps1

      - name: Ensure admin-edition binary compiles
        run: cargo check -p poltergeist-app --features admin-edition --locked

  build:
    runs-on: blacksmith-8vcpu-windows-2025
    timeout-minutes: 35
    needs: pre-checks

    steps:
      - name: Checkout code
        uses: useblacksmith/checkout@v1

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies and build outputs
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-stable-workspace

      - name: Build user edition binary
        run: cargo build -p poltergeist-app --release --locked

      - name: Package user edition zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force staging-user | Out-Null
          Copy-Item target/release/poltergeist.exe staging-user/poltergeist.exe
          if (Test-Path assets) {
            Copy-Item -Recurse assets staging-user/assets
          }
          Compress-Archive -Path staging-user/* -DestinationPath poltergeist-user-windows.zip -Force

      - name: Build admin edition binary
        run: cargo build -p poltergeist-app --release --features admin-edition --locked

      - name: Package admin edition zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force staging-admin | Out-Null
          Copy-Item target/release/poltergeist.exe staging-admin/poltergeist-admin.exe
          if (Test-Path assets) {
            Copy-Item -Recurse assets staging-admin/assets
          }
          Compress-Archive -Path staging-admin/* -DestinationPath poltergeist-admin-windows.zip -Force

      # Artifacts are for debugging/verification only. Published GitHub Releases
      # are produced by the manual release.yml workflow, never on push.
      - name: Upload build zips
        uses: actions/upload-artifact@v7
        with:
          name: poltergeist-windows-zips
          path: |
            poltergeist-user-windows.zip
            poltergeist-admin-windows.zip
          if-no-files-found: error

  discord-status:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10
    needs: [pre-checks, build]
    if: ${{ always() && github.ref == 'refs/heads/main' }}

    steps:
      - name: Send Discord status
        uses: iShark5060/actions-discord-status@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ contains(needs.*.result, 'failure') && 'failure' || contains(needs.*.result, 'cancelled') && 'cancelled' || 'success' }}
          content: "<@${{ secrets.DISCORD_USERID }}>"
          title: ${{ github.workflow }}
          description: ${{ contains(needs.*.result, 'failure') && format('CI failed for commit `{0}`. Review workflow logs.', github.sha) || contains(needs.*.result, 'cancelled') && format('CI was cancelled for commit `{0}`.', github.sha) || format('CI passed for commit `{0}`. Build artifacts are available on the workflow run.', github.sha) }}
          color: ${{ contains(needs.*.result, 'failure') && '0xff0000' || contains(needs.*.result, 'cancelled') && '0xffaa00' || '0x00ff00' }}
