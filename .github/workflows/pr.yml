name: Poltergeist PR Checks

permissions:
  contents: read
  pull-requests: read

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: blacksmith-8vcpu-windows-2025
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: useblacksmith/checkout@v1

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies and build outputs
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-stable-workspace

      - name: Run quality checks
        shell: pwsh
        run: ./scripts/validate.ps1
